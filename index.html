<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tappal Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #1a3c5e;
            --primary-light: #2c5f8a;
            --accent: #e8913a;
            --accent-light: #f5a623;
            --danger: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #5a6c7d;
            --border: #dce3ea;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        #root {
            min-height: 100vh;
        }

        /* Login */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3c5e 0%, #2c5f8a 40%, #1a3c5e 100%);
            padding: 20px;
        }
        .login-card {
            background: var(--card);
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .login-card .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .login-card h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .login-card .subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .login-card input,
        .login-card select {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: var(--transition);
            background: #fafbfc;
        }
        .login-card input:focus,
        .login-card select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.1);
            background: #fff;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 60, 94, 0.3);
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
        }
        .btn-accent:hover {
            background: var(--accent-light);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover {
            background: #219a52;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: #a93226;
        }
        .btn-outline {
            background: #fff;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: #eef4f9;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
            border-radius: 6px;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 4px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Layout */
        .app-layout {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: var(--primary);
            color: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topbar .role-badge {
            background: var(--accent);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .topbar .role-badge.admin-badge {
            background: #e74c3c;
        }
        .topbar h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-header h3 {
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            border: 2px solid var(--border);
            transition: var(--transition);
        }
        .stat-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow);
        }
        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card.warning .stat-num {
            color: var(--warning);
        }
        .stat-card.danger .stat-num {
            color: var(--danger);
        }
        .stat-card.success .stat-num {
            color: var(--success);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        table th,
        table td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        table th {
            background: #f7f9fb;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        table tr:hover {
            background: #fafcfd;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-pending {
            background: #fef3cd;
            color: #856404;
        }
        .badge-completed {
            background: #d4edda;
            color: #155724;
        }
        .badge-urgent {
            background: #f8d7da;
            color: #721c24;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        .time-elapsed {
            font-weight: 600;
            color: var(--danger);
        }
        .time-normal {
            color: var(--text-light);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal h3 {
            margin-bottom: 16px;
            color: var(--primary);
        }
        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .modal input:focus,
        .modal select:focus,
        .modal textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.08);
        }
        .modal textarea {
            min-height: 80px;
            resize: vertical;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        /* Image preview */
        .image-preview {
            max-width: 200px;
            max-height: 150px;
            border-radius: var(--radius-sm);
            border: 2px dashed var(--border);
            object-fit: contain;
            margin: 8px 0;
            display: block;
        }
        .completion-msg {
            background: #eafaf1;
            border-left: 4px solid var(--success);
            padding: 10px 14px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin: 8px 0;
            font-size: 0.85rem;
            color: #155724;
        }
        .transfer-note {
            background: #fef9e7;
            border-left: 4px solid var(--warning);
            padding: 10px 14px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin: 8px 0;
            font-size: 0.85rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
        }
        .tab {
            padding: 10px 18px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: var(--transition);
            border-radius: 6px 6px 0 0;
        }
        .tab:hover {
            color: var(--primary);
            background: #f5f8fb;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--accent);
            background: #fafcfd;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topbar {
                padding: 10px 14px;
                flex-direction: column;
                align-items: flex-start;
            }
            .topbar h2 {
                font-size: 1rem;
            }
            .main-content {
                padding: 12px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .stat-card {
                padding: 12px 8px;
            }
            .stat-card .stat-num {
                font-size: 1.4rem;
            }
            table th,
            table td {
                padding: 6px 8px;
                font-size: 0.78rem;
            }
            .modal {
                padding: 18px 14px;
                max-width: 95vw;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .card {
                padding: 14px;
            }
        }
        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .tab {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .highlight-row {
            animation: highlightAnim 2s ease;
        }
        @keyframes highlightAnim {
            0% {
                background: #fffde7;
            }
            100% {
                background: transparent;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

        // ==================== DATA LAYER ====================
        const STORAGE_KEY = 'tappal_app_data';

        const defaultUsers = [
            { id: 'u1', username: 'dispatch', password: 'dispatch123', name: 'Dispatch Officer', role: 'dispatch',
                department: null, parentId: null },
            { id: 'u2', username: 'director', password: 'director123', name: 'Director', role: 'director',
                department: null, parentId: null },
            { id: 'u3', username: 'dy_dir_rd', password: 'password123', name: 'Dy. Dir. (Research & Development)',
                role: 'dy_dir', department: 'rd', parentId: 'u2' },
            { id: 'u4', username: 'dy_dir_ee', password: 'password123', name: 'Dy. Dir. (Environment & Education)',
                role: 'dy_dir', department: 'ee', parentId: 'u2' },
            { id: 'u5', username: 'rd_admin', password: 'password123', name: 'Admin (R&D)', role: 'sub_user',
                department: 'rd', subRole: 'admin', parentId: 'u3' },
            { id: 'u6', username: 'rd_plan', password: 'password123', name: 'Plan (R&D)', role: 'sub_user',
                department: 'rd', subRole: 'plan', parentId: 'u3' },
            { id: 'u7', username: 'rd_account', password: 'password123', name: 'Account (R&D)', role: 'sub_user',
                department: 'rd', subRole: 'account', parentId: 'u3' },
            { id: 'u8', username: 'rd_research', password: 'password123', name: 'Research (R&D)', role: 'sub_user',
                department: 'rd', subRole: 'research', parentId: 'u3' },
            { id: 'u9', username: 'rd_lab', password: 'password123', name: 'Laboratory (R&D)', role: 'sub_user',
                department: 'rd', subRole: 'laboratory', parentId: 'u3' },
            { id: 'u10', username: 'ee_admin', password: 'password123', name: 'Admin (E&E)', role: 'sub_user',
                department: 'ee', subRole: 'admin', parentId: 'u4' },
            { id: 'u11', username: 'ee_plan', password: 'password123', name: 'Plan (E&E)', role: 'sub_user',
                department: 'ee', subRole: 'plan', parentId: 'u4' },
            { id: 'u12', username: 'ee_account', password: 'password123', name: 'Account (E&E)', role: 'sub_user',
                department: 'ee', subRole: 'account', parentId: 'u4' },
            { id: 'u13', username: 'ee_ee', password: 'password123', name: 'E&E Officer (E&E)', role: 'sub_user',
                department: 'ee', subRole: 'ee', parentId: 'u4' },
        ];

        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    return {
                        users: data.users || defaultUsers,
                        tappals: data.tappals || [],
                        nextTappalNum: data.nextTappalNum || 1,
                    };
                } catch (e) { /* fall through */ }
            }
            return { users: defaultUsers, tappals: [], nextTappalNum: 1 };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ==================== CONTEXT ====================
        const AppContext = createContext(null);

        function useApp() {
            return useContext(AppContext);
        }

        // ==================== UTILS ====================
        function formatTimeAgo(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const mins = Math.floor(diff / 60000);
            const hrs = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return `${mins} min ago`;
            if (hrs < 24) return `${hrs} hr${hrs>1?'s':''} ago`;
            return `${days} day${days>1?'s':''} ago`;
        }

        function formatDuration(timestamp) {
            const diff = Date.now() - timestamp;
            const mins = Math.floor(diff / 60000);
            const hrs = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (days > 0) return `${days}d ${hrs%24}h`;
            if (hrs > 0) return `${hrs}h ${mins%60}m`;
            return `${mins}m`;
        }

        function getDurationClass(timestamp) {
            const diff = Date.now() - timestamp;
            const days = diff / 86400000;
            if (days > 7) return 'time-elapsed';
            if (days > 3) return 'time-normal';
            return '';
        }

        function generateId() {
            return 'tpl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        function generateUserId() {
            return 'u' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        }

        // ==================== COMPONENTS ====================

        // --- Login Screen ---
        function LoginScreen() {
            const { login } = useApp();
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [showHint, setShowHint] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                const result = login(username.trim(), password);
                if (!result.success) {
                    setError(result.message);
                }
            };

            return (
                <div className="login-container">
                    <form className="login-card" onSubmit={handleLogin}>
                        <div className="logo">📬</div>
                        <h1>Tappal Management</h1>
                        <p className="subtitle">Government Correspondence Tracking System</p>
                        {error && <p style={{color:'#c0392b',marginBottom:8,fontWeight:600}}>{error}</p>}
                        <input
                            type="text"
                            placeholder="Username"
                            value={username}
                            onChange={e=>setUsername(e.target.value)}
                            autoFocus
                        />
                        <input
                            type="password"
                            placeholder="Password"
                            value={password}
                            onChange={e=>setPassword(e.target.value)}
                        />
                        <button type="submit" className="btn btn-primary">🔐 Sign In</button>
                        <button
                            type="button"
                            className="btn btn-outline"
                            style={{marginTop:8,width:'100%',justifyContent:'center'}}
                            onClick={()=>setShowHint(!showHint)}
                        >
                            {showHint ? 'Hide' : 'Show'} Demo Credentials
                        </button>
                        {showHint && (
                            <div style={{textAlign:'left',marginTop:12,fontSize:'0.8rem',background:'#f7f9fb',padding:12,borderRadius:8}}>
                                <p><strong>Director:</strong> director / director123</p>
                                <p><strong>Dispatch:</strong> dispatch / dispatch123</p>
                                <p><strong>Dy.Dir (R&D):</strong> dy_dir_rd / password123</p>
                                <p><strong>Dy.Dir (E&E):</strong> dy_dir_ee / password123</p>
                                <p><strong>Sub-users:</strong> rd_admin, rd_plan, rd_account, rd_research, rd_lab, ee_admin, ee_plan, ee_account, ee_ee / password123</p>
                            </div>
                        )}
                    </form>
                </div>
            );
        }

        // --- Dispatch Dashboard ---
        function DispatchDashboard() {
            const { data, currentUser, createTappal, assignTappal, refreshData } = useApp();
            const [showCreate, setShowCreate] = useState(false);
            const [newTappal, setNewTappal] = useState({
                subject: '',
                description: '',
                priority: 'normal',
                assignedTo: '',
                note: '',
                image: null,
            });
            const [imagePreview, setImagePreview] = useState(null);
            const fileInputRef = useRef(null);

            const myTappals = data.tappals.filter(t =>
                t.assignmentHistory.some(h => h.from === currentUser.id) ||
                t.createdBy === currentUser.id
            );

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        alert('Image size should be under 2MB for localStorage. Resizing...');
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        // Compress large images
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width,
                                h = img.height;
                            const maxDim = 400;
                            if (w > maxDim || h > maxDim) {
                                const ratio = Math.min(maxDim / w, maxDim / h);
                                w = Math.round(w * ratio);
                                h = Math.round(h * ratio);
                            }
                            canvas.width = w;
                            canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            const compressed = canvas.toDataURL('image/jpeg', 0.7);
                            setImagePreview(compressed);
                            setNewTappal(prev => ({ ...prev, image: compressed }));
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleCreate = () => {
                if (!newTappal.subject.trim()) {
                    alert('Please enter a subject.');
                    return;
                }
                if (!newTappal.assignedTo) {
                    alert('Please select who to assign the tappal to.');
                    return;
                }
                createTappal({
                    subject: newTappal.subject.trim(),
                    description: newTappal.description.trim(),
                    priority: newTappal.priority,
                    assignedTo: newTappal.assignedTo,
                    note: newTappal.note.trim(),
                    image: newTappal.image,
                });
                setNewTappal({ subject: '', description: '', priority: 'normal', assignedTo: '', note: '', image: null });
                setImagePreview(null);
                setShowCreate(false);
            };

            const getAssignableUsers = () => {
                return data.users.filter(u =>
                    u.role === 'director' || u.role === 'dy_dir'
                );
            };

            return (
                <div>

// --- Director Dashboard ---
function DirectorDashboard() {
const { data, currentUser, assignTappal, refreshData } = useApp();
const [activeTab, setActiveTab] = useState('all');
const [transferModal, setTransferModal] = useState(null);
const [transferTo, setTransferTo] = useState('');
const [transferReason, setTransferReason] = useState('');
const [showCreateUser, setShowCreateUser] = useState(false);
const [newUser, setNewUser] = useState({username:'',password:'',name:'',role:'sub_user',department:'rd',subRole:'admin',parentId:''});
const [showDetail, setShowDetail] = useState(null);

const allTappals = data.tappals;
const pendingTappals = allTappals.filter(t => t.status === 'pending');
const completedTappals = allTappals.filter(t => t.status === 'completed');
const urgentPending = pendingTappals.filter(t => t.priority === 'urgent');

const displayedTappals = activeTab === 'all' ? allTappals :
activeTab === 'pending' ? pendingTappals :
activeTab === 'completed' ? completedTappals :
activeTab === 'urgent' ? urgentPending : allTappals;

const pendingRatio = allTappals.length > 0 ?
    Math.round((pendingTappals.length / allTappals.length) * 100) : 0;

const handleTransfer = () => {
    if (!transferTo || !transferModal) return;
    assignTappal(transferModal.id, transferTo, transferReason.trim() || 'Transferred by Director');
    setTransferModal(null);
    setTransferTo('');
    setTransferReason('');
};

const getDyDirUsers = (dept) => {
    return data.users.filter(u => u.role === 'dy_dir' && u.department === dept);
};

const getSubUsers = (dept) => {
    return data.users.filter(u => u.role === 'sub_user' && u.department === dept);
};

const handleCreateUser = () => {
    if (!newUser.username.trim() || !newUser.password.trim() || !newUser.name.trim()) {
        alert('Please fill all required fields.');
        return;
    }
    if (data.users.find(u => u.username === newUser.username.trim())) {
        alert('Username already exists.');
        return;
    }
    const updatedUsers = [...data.users, {
        id: generateUserId(),
        username: newUser.username.trim(),
        password: newUser.password.trim(),
        name: newUser.name.trim(),
        role: newUser.role,
        department: newUser.role === 'sub_user' ? newUser.department : null,
        subRole: newUser.role === 'sub_user' ? newUser.subRole : null,
        parentId: newUser.parentId || (newUser.role==='sub_user'&&newUser.department==='rd'?'u3':newUser.role==='sub_user'&&newUser.department==='ee'?'u4':null),
    }];
    const updatedData = { ...data, users: updatedUsers };
    saveData(updatedData);
    refreshData();
    setShowCreateUser(false);
    setNewUser({username:'',password:'',name:'',role:'sub_user',department:'rd',subRole:'admin',parentId:''});
    alert('User created successfully!');
};

                <div className="stat-card danger"><div className="stat-num">{urgentPending.length}</div><div className="stat-label">Urgent Pending</div></div>
                <div className="stat-card success"><div className="stat-num">{completedTappals.length}</div><div className="stat-label">Completed</div></div>

                    <tbody>

{transferModal && (

            <label>Transfer To *</label>
            <select value={transferTo} onChange={e=>setTransferTo(e.target.value)}>

{/* Detail Modal */}
{showDetail && (

function DyDirDashboard() {
const { data, currentUser, assignTappal, refreshData } = useApp();
const dept = currentUser.department;
const deptName = dept === 'rd' ? 'Research & Development' : 'Environment & Education';
const [activeTab, setActiveTab] = useState('incoming');
const [assignModal, setAssignModal] = useState(null);
const [assignTo, setAssignTo] = useState('');
const [assignNote, setAssignNote] = useState('');

const subUsers = data.users.filter(u => u.role === 'sub_user' && u.department === dept);
const incomingTappals = data.tappals.filter(t => t.currentAssignedTo === currentUser.id && t.status === 'pending');
const assignedOut = data.tappals.filter(t =>
t.assignmentHistory.some(h => h.from === currentUser.id) &&
t.currentAssignedTo !== currentUser.id
);
const allDeptTappals = data.tappals.filter(t =>
t.assignmentHistory.some(h => {
    const fromUser = data.users.find(u => u.id === h.from);
    const toUser = data.users.find(u => u.id === h.to);
    return (fromUser && fromUser.department === dept) || (toUser && toUser.department === dept) ||
        (h.from === currentUser.id) || (h.to === currentUser.id);
}) || t.currentAssignedTo === currentUser.id
);

const displayedTappals = activeTab === 'incoming' ? incomingTappals :
activeTab === 'assigned' ? assignedOut :
activeTab === 'all_dept' ? allDeptTappals : incomingTappals;

const handleAssign = () => {
    if (!assignTo || !assignModal) return;
    assignTappal(assignModal.id, assignTo, assignNote.trim() || `Assigned by ${currentUser.name}`);

    setAssignTo('');

        <div className="tabs">
            <button className={`tab ${activeTab==='incoming'?'active':''}`} onClick={()=>setActiveTab('incoming')}>📥 Incoming ({incomingTappals.length})</button>
            <button className={`tab ${activeTab==='assigned'?'active':''}`} onClick={()=>setActiveTab('assigned')}>📤 Assigned Out ({assignedOut.length})</button>
            <button className={`tab ${activeTab==='all_dept'?'active':''}`} onClick={()=>setActiveTab('all_dept')}>📋 All Dept ({allDeptTappals.length})</button>
        </div>

        <div className="card">
            <div className="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>Subject</th><th>Current With</th><th>Status</th><th>Since</th><th>Duration</th><th>Actions</th></tr>
                    </thead>
                    <tbody>

                            <tr><td colSpan={7} style={{textAlign:'center',padding:30}}>No tappals to show.</td></tr>

                                const assignee = data.users.find(u => u.id === t.currentAssignedTo);
                                return (
                                    <tr key={t.id}>
                                        <td><strong>#{t.tappalNumber}</strong></td>
                                        <td>{t.subject}{t.image&&' 📎'}</td>
                                        <td>{assignee?.name||'Unknown'}</td>

                                        <td>{formatTimeAgo(t.createdAt)}</td>
                                        <td className={t.status==='pending'?getDurationClass(t.createdAt):''}>{t.status==='pending'?formatDuration(t.createdAt):'✅'}</td>

                </tbody>
            </table>

    {/* Assign Modal */}

const [completeModal, setCompleteModal] = useState(null);
const [completionMsg, setCompletionMsg] = useState('');

const myTappals = data.tappals.filter(t => t.currentAssignedTo === currentUser.id);
const pendingForMe = myTappals.filter(t => t.status === 'pending');
const completedByMe = data.tappals.filter(t => t.completedBy === currentUser.id);

const handleComplete = () => {
    if (!completionMsg.trim() || !completeModal) {
        alert('Please write a completion message.');
        return;
    }
    completeTappal(completeModal.id, completionMsg.trim());
    setCompleteModal(null);
    setCompletionMsg('');
};

return (
    <div>
        <div className="card">
            <div className="card-header">
                <h3>👤 {currentUser.name} ({currentUser.subRole})</h3>
                <span className="role-badge">{currentUser.department==='rd'?'R&D':'E&E'}</span>
            </div>
            <div className="stats-grid">
                <div className="stat-card warning"><div className="stat-num">{pendingForMe.length}</div><div className="stat-label">Pending for Me</div></div>
                <div className="stat-card success"><div className="stat-num">{completedByMe.length}</div><div className="stat-label">Completed by Me</div></div>
                <div className="stat-card"><div className="stat-num">{myTappals.length}</div><div className="stat-label">Total Assigned</div></div>
            </div>
        </div>

        <div className="card">
            <div className="card-header"><h3>📥 My Tappals</h3></div>
            <div className="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>Subject</th><th>Priority</th><th>Status</th><th>Assigned</th><th>Duration</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                        {myTappals.length === 0 ? (
                            <tr><td colSpan={7} style={{textAlign:'center',padding:30}}>No tappals assigned to you. 🎉</td></tr>
                        ) : (
                            myTappals.sort((a,b)=>b.createdAt-a.createdAt).map(t => (
                                <tr key={t.id}>
                                    <td><strong>#{t.tappalNumber}</strong></td>
                                    <td>{t.subject}{t.image&&' 📎'}</td>
                                    <td><span className={`badge ${t.priority==='urgent'?'badge-urgent':t.priority==='high'?'badge-pending':'badge-completed'}`}>{t.priority}</span></td>
                                    <td><span className={`badge ${t.status==='completed'?'badge-completed':'badge-pending'}`}>{t.status}</span></td>
                                    <td>{formatTimeAgo(t.createdAt)}</td>
                                    <td className={t.status==='pending'?getDurationClass(t.createdAt):''}>{t.status==='pending'?formatDuration(t.createdAt):'✅'}</td>
                                    <td>
                                        {t.status==='pending' && (
                                            <button className="btn btn-xs btn-success"
                                            onClick={()=>{setCompleteModal(t);setCompletionMsg('');}}>
                                            ✅ Mark Complete
                                        </button>
                                    )}
                                    {t.completionNote && t.completedBy===currentUser.id && (
                                        <div className="completion-msg" style={{marginTop:4,fontSize:'0.75rem'}}>
                                            ✅ {t.completionNote.substring(0,50)}...
                                        </div>
                                    )}
                                </td>
                            </tr>
                        ))
                    )}
                </tbody>
            </table>
        </div>
    </div>

    {/* Complete Modal */}
    {completeModal && (
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setCompleteModal(null);}}>
            <div className="modal">
                <h3>✅ Complete Tappal #{completeModal.tappalNumber}</h3>
                <p><strong>Subject:</strong> {completeModal.subject}</p>
                <p><strong>Description:</strong> {completeModal.description||'N/A'}</p>
                {completeModal.image && <img src={completeModal.image} alt="Doc" className="image-preview" style={{maxWidth:'100%',maxHeight:200}}/>}
                <label>Completion Message *</label>
                <textarea
                    value={completionMsg}
                    onChange={e=>setCompletionMsg(e.target.value)}
                    placeholder="Write a brief message about the work completed..."
                />
                <p style={{fontSize:'0.75rem',color:'var(--text-light)'}}>This message will be visible to Director and your Dy. Director.</p>
                <div className="modal-actions">
                    <button className="btn btn-outline" onClick={()=>setCompleteModal(null)}>Cancel</button>
                    <button className="btn btn-success" onClick={handleComplete} disabled={!completionMsg.trim()}>✅ Confirm Completion</button>
                </div>
            </div>
        </div>
    )}
</div>
);
}

// --- Main App ---
function App() {
const [appData, setAppData] = useState(loadData);
const [currentUser, setCurrentUser] = useState(null);
const [screen, setScreen] = useState('login');

const refreshData = useCallback(() => {
    setAppData(loadData());
}, []);

const login = useCallback((username, password) => {
    const user = appData.users.find(
        u => u.username.toLowerCase() === username.toLowerCase() && u.password === password
    );
    if (!user) {
        return { success: false, message: 'Invalid username or password.' };
    }
    setCurrentUser(user);
    setScreen(user.role);
    return { success: true };
}, [appData.users]);

const logout = useCallback(() => {
    setCurrentUser(null);
    setScreen('login');
}, []);

const createTappal = useCallback((tappalData) => {
    const newTappal = {
        id: generateId(),
        tappalNumber: appData.nextTappalNum,
        subject: tappalData.subject,
        description: tappalData.description,
        priority: tappalData.priority,
        image: tappalData.image || null,
        createdAt: Date.now(),
        currentAssignedTo: tappalData.assignedTo,
        createdBy: currentUser.id,
        assignmentHistory: [{
            from: currentUser.id,
            to: tappalData.assignedTo,
            timestamp: Date.now(),
            note: tappalData.note || 'Initial assignment',
        }],
        status: 'pending',
        completionNote: null,
        completedBy: null,
        completedAt: null,
    };
    const updated = {
        ...appData,
        tappals: [...appData.tappals, newTappal],
        nextTappalNum: appData.nextTappalNum + 1,
    };
    saveData(updated);
    setAppData(updated);
}, [appData, currentUser]);

const assignTappal = useCallback((tappalId, newUserId, note) => {
    const updatedTappals = appData.tappals.map(t => {
        if (t.id === tappalId) {
            return {
                ...t,
                currentAssignedTo: newUserId,
                assignmentHistory: [
                    ...t.assignmentHistory,
                    {
                        from: currentUser.id,
                        to: newUserId,
                        timestamp: Date.now(),
                        note: note || 'Transferred',
                    },
                ],
            };
        }
        return t;
    });
    const updated = { ...appData, tappals: updatedTappals };
    saveData(updated);
    setAppData(updated);
}, [appData, currentUser]);

const completeTappal = useCallback((tappalId, message) => {
    const updatedTappals = appData.tappals.map(t => {
        if (t.id === tappalId) {
            return {
                ...t,
                status: 'completed',
                completionNote: message,
                completedBy: currentUser.id,
                completedAt: Date.now(),
            };
        }
        return t;
    });
    const updated = { ...appData, tappals: updatedTappals };
    saveData(updated);
    setAppData(updated);
}, [appData, currentUser]);

const contextValue = {
    data: appData,
    currentUser,
    login,
    logout,
    createTappal,
    assignTappal,
    completeTappal,
    refreshData,
};

if (!currentUser) {
    return (
        <AppContext.Provider value={contextValue}>
            <LoginScreen />
        </AppContext.Provider>
    );
}

const roleLabels = {
    dispatch: 'Dispatch Officer',
    director: 'Director (Admin)',
    dy_dir: currentUser.department === 'rd' ? 'Dy. Dir. (R&D)' : 'Dy. Dir. (E&E)',
    sub_user: `${currentUser.name} (${currentUser.subRole}) - ${currentUser.department=== 'rd'?'R&D':'E&E'}`,
};

return (
    <AppContext.Provider value={contextValue}>
        <div className="app-layout">
            <div className="topbar">
                <div>
                    <h2>📬 Tappal Management</h2>
                </div>
                <div className="user-info">
                    <span className={`role-badge ${currentUser.role==='director'?'admin-badge':''}`}>
                        {roleLabels[currentUser.role] || currentUser.role}
                    </span>
                    <span style={{fontWeight:600}}>{currentUser.name}</span>
                    <button className="btn btn-sm btn-outline" style={{color:'#fff',borderColor:'rgba(255,255,255,0.5)'}} onClick={logout}>
                        🚪 Logout
                    </button>
                </div>
            </div>
            <div className="main-content">
                {currentUser.role === 'dispatch' && <DispatchDashboard />}
                {currentUser.role === 'director' && <DirectorDashboard />}
                {currentUser.role === 'dy_dir' && <DyDirDashboard />}
                {currentUser.role === 'sub_user' && <SubUserDashboard />}
            </div>
        </div>
    </AppContext.Provider>
);
}

// Render
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

console.log('📬 Tappal Management System Ready');
console.log('Demo Credentials:');
console.log('  Director: director / director123');
console.log('  Dispatch: dispatch / dispatch123');
console.log('  Dy.Dir(R&D): dy_dir_rd / password123');
console.log('  Dy.Dir(E&E): dy_dir_ee / password123');
console.log('  Sub-users: rd_admin, rd_plan, rd_account, rd_research, rd_lab, ee_admin, ee_plan, ee_account, ee_ee / password123');
</script>
</body>
</html>
